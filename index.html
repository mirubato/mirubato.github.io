<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ミルバト｜ココロミルの学習アプリ</title>
<style>
  :root{--ink:#3d3a33;--sub:#8d8672;--line:#e3ddcc;--green:#4d9e63;--gold:#d8a93a;--paper:#f7f4ec;--card:#fffdf7;}
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",sans-serif;background:var(--paper);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 16px 40px;}
  h1{font-size:34px;letter-spacing:2px;margin-top:8px;}
  .sub{color:var(--sub);font-size:13px;margin:6px 0 26px;text-align:center;}
  .wrap{width:100%;max-width:440px;}
  .sec{margin-bottom:22px;}
  .sec h2{font-size:14px;color:var(--sub);letter-spacing:1px;margin:0 0 8px 4px;}
  .tiles{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  a.tile,div.tile{display:flex;align-items:center;gap:12px;background:var(--card);border:2px solid var(--line);border-radius:16px;padding:14px 16px;text-decoration:none;color:var(--ink);transition:transform .08s;}
  a.tile:active{transform:scale(.97);}
  .tile .emoji{font-size:28px;}
  .tile .name{font-weight:700;font-size:16px;}
  .tile .desc{font-size:11px;color:var(--sub);margin-top:2px;}
  .tile.soon{opacity:.55;}
  .tile.soon .badge{font-size:10px;background:var(--line);border-radius:8px;padding:2px 7px;color:var(--sub);margin-left:auto;white-space:nowrap;}
  /* ログインカード */
  .login-card{background:var(--card);border:2px solid var(--line);border-radius:18px;padding:22px 20px;}
  .login-card label{display:block;font-size:13px;font-weight:700;margin:14px 0 6px;}
  .login-card label:first-child{margin-top:0;}
  .login-card input,.login-card select{width:100%;font-size:16px;padding:11px 12px;border:2px solid var(--line);border-radius:12px;background:#fff;color:var(--ink);}
  .login-card .hint{font-size:11px;color:var(--sub);margin-top:5px;}
  .login-card button{width:100%;margin-top:20px;font-size:16px;font-weight:700;padding:13px;border:none;border-radius:14px;background:var(--green);color:#fff;cursor:pointer;}
  .login-card button:active{opacity:.85;}
  .err{color:#c0504d;font-size:12px;margin-top:10px;min-height:1em;}
  /* ログイン後ヘッダー */
  .who{display:flex;align-items:center;justify-content:space-between;background:var(--card);border:2px solid var(--line);border-radius:14px;padding:10px 14px;margin-bottom:18px;font-size:14px;}
  .who b{font-size:16px;}
  .who a{color:var(--sub);font-size:12px;text-decoration:underline;cursor:pointer;}
  footer{margin-top:auto;padding-top:30px;font-size:11px;color:var(--sub);}
  .hidden{display:none!important;}
  @media (max-width:360px){.tiles{grid-template-columns:1fr;}}
</style>
</head>
<body>
  <h1>ミルバト</h1>
  <div class="sub" id="subText">ココロミルの学習アプリ</div>
  <div class="wrap">

    <!-- ログイン画面 -->
    <div id="loginView" class="hidden">
      <div class="login-card">
        <label for="nick">ニックネーム</label>
        <input id="nick" placeholder="れい：みかん" maxlength="12" autocomplete="off">
        <div class="hint">本名は使わず、好きな名前にしてね。先生もこの名前を見るよ</div>
        <label for="pin">番号（塾からもらった数字）</label>
        <input id="pin" placeholder="れい：308417" inputmode="numeric" autocomplete="off">
        <div class="hint">先生からもらった数字だよ。他の人には教えないでね</div>
        <label for="campus">校舎（初めての人だけ選んでね）</label>
        <select id="campus">
          <option value="">選んでね</option>
          <option>麻布</option><option>渋谷</option><option>四谷</option><option>新宿</option><option>自由が丘</option>
        </select>
        <button id="startBtn">始める</button>
        <div class="err" id="err"></div>
      </div>
    </div>

    <!-- 教科えらび -->
    <div id="menuView" class="hidden">
      <div class="who"><span>こんにちは <b id="whoNick"></b> さん</span><a id="logoutLink">ログアウト</a></div>
      <div class="sec">
        <h2>社会</h2>
        <div class="tiles">
          <a class="tile" href="./chiri/"><span class="emoji">🗾</span><span><span class="name">地理</span><div class="desc">都道府県・産業・自然</div></span></a>
          <a class="tile" href="./rekishi/"><span class="emoji">📜</span><span><span class="name">歴史</span><div class="desc">縄文〜昭和</div></span></a>
          <a class="tile" href="./koumin/"><span class="emoji">🏛️</span><span><span class="name">公民</span><div class="desc">憲法・政治・経済・国際</div></span></a>
        </div>
      </div>
      <div class="sec">
        <h2>国語・理科</h2>
        <div class="tiles">
          <div class="tile soon"><span class="emoji">📖</span><span><span class="name">国語</span><div class="desc">じゅんびちゅう</div></span><span class="badge">近日</span></div>
          <div class="tile soon"><span class="emoji">🔬</span><span><span class="name">理科</span><div class="desc">じゅんびちゅう</div></span><span class="badge">近日</span></div>
        </div>
      </div>
    </div>

  </div>
  <footer>ミルバト ・ ココロミル</footer>
<script>
(function(){
  const KEY="mirubato_login";
  const SUPABASE_URL="https://ewvtwcidvqrhozlceypi.supabase.co";
  const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV3dnR3Y2lkdnFyaG96bGNleXBpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODMyNDYxOTYsImV4cCI6MjA5ODgyMjE5Nn0.bqQWl5mOP659idb-Wwqiwm15ecNIHl2Kt4FBR01gUB4";
  const $=id=>document.getElementById(id);
  const REG_ERR={bad_nick:"ニックネームは1〜12文字で入れてね",bad_campus:"初めての人は校舎を選んでね",
    bad_number:"その番号は使えないみたい。先生にもらった番号を確かめてね",
    nick_taken:"そのニックネームはもう使われているよ。別の名前にしてね"};
  async function rpc(fn,args){
    const res=await fetch(SUPABASE_URL+"/rest/v1/rpc/"+fn,{method:"POST",
      headers:{"Content-Type":"application/json","apikey":SUPABASE_ANON_KEY,"Authorization":"Bearer "+SUPABASE_ANON_KEY},
      body:JSON.stringify(args||{})});
    if(!res.ok)throw new Error("rpc "+fn+" HTTP "+res.status);
    return res.json();
  }
  // 保存形式: {sv:1, nick, pin, campus, verified:bool, verifiedAt}
  // verified=true はサーバ認証済み。通信失敗時のオフライン保存は verified=false で区別する
  function saved(){
    try{
      const s=JSON.parse(localStorage.getItem(KEY)||"null");
      if(!s||typeof s.nick!=="string"||s.nick.length<1||s.nick.length>12||!/^\d{4,8}$/.test(s.pin||"")||(s.sv&&s.sv!==1)){
        if(s)localStorage.removeItem(KEY); // 形式不正は破棄
        return null;
      }
      return s;
    }catch(e){return null;}
  }
  function save(nick,pin,campus,verified){ try{localStorage.setItem(KEY,JSON.stringify({sv:1,nick:nick,pin:pin,campus:campus,verified:!!verified,verifiedAt:verified?Date.now():0}));}catch(e){} }
  function render(){
    const s=saved();
    $("loginView").classList.toggle("hidden", !!s);
    $("menuView").classList.toggle("hidden", !s);
    $("subText").textContent = s ? "やりたい教科を選んでね" : "ニックネームと番号でログインしてね";
    if(s) $("whoNick").textContent = s.nick;
  }
  $("startBtn").onclick=async function(){
    const nick=$("nick").value.trim(), pin=$("pin").value.trim(), campus=$("campus").value;
    $("err").textContent="";
    if(nick.length<1||nick.length>12){$("err").textContent="ニックネームは1〜12文字で入れてね";return;}
    if(!/^\d{4,8}$/.test(pin)){$("err").textContent="番号は数字（4〜8桁）で入れてね";return;}
    $("startBtn").disabled=true; $("startBtn").textContent="確認中…";
    try{
      // サーバで本人確認してから保存する（成功時だけログイン扱い）
      let r=await rpc('login_player',{p_nick:nick,p_number:pin,p_subject:'chiri'});
      if(!r.ok&&r.reason==='not_found'){
        if(!campus){$("err").textContent="初めての人は校舎を選んでね";return;}
        r=await rpc('register_player',{p_nick:nick,p_number:pin,p_campus:campus});
        if(!r.ok){$("err").textContent=REG_ERR[r.reason]||"登録できませんでした";return;}
      }else if(!r.ok&&r.reason==='suspended'){
        $("err").textContent="このアカウントは 今 止まっているよ。先生に聞いてね";return;
      }else if(!r.ok){
        $("err").textContent="番号が違うみたい。もう一度確かめてね";return;
      }
      save(nick,pin,r.campus||campus,true);
      render();
    }catch(e){
      // サーバに届かない（オフライン等）→ 未認証(verified:false)として保存し、各教科アプリ側のオフライン動作に任せる
      save(nick,pin,campus,false);
      render();
    }finally{
      $("startBtn").disabled=false; $("startBtn").textContent="始める";
    }
  };
  $("logoutLink").onclick=function(){
    try{localStorage.removeItem(KEY);}catch(e){}
    $("nick").value="";$("pin").value="";$("campus").value="";$("err").textContent="";
    render();
  };
  render();
  // 保存済みログイン情報の再確認: 未認証(verified:false)または12時間経過ならバックグラウンドで再認証。
  // 停止・番号違い・未登録なら共有キーを破棄してログイン画面へ。通信失敗ならそのまま（オフライン容認）。
  (async function reverify(){
    const s=saved();
    if(!s)return;
    const stale=!s.verified||!s.verifiedAt||(Date.now()-s.verifiedAt)>12*60*60*1000;
    if(!stale)return;
    try{
      const r=await rpc('login_player',{p_nick:s.nick,p_number:s.pin,p_subject:'chiri'});
      if(r.ok){ save(s.nick,s.pin,r.campus||s.campus,true); }
      else if(r.reason==='wrong_number'||r.reason==='not_found'||r.reason==='suspended'){
        localStorage.removeItem(KEY);
        render();
        if(r.reason==='suspended')$("err").textContent="このアカウントは 今 止まっているよ。先生に聞いてね";
      }
    }catch(e){ /* オフライン → verified:falseのまま利用継続 */ }
  })();
})();
</script>
</body>
</html>
